version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0-alpine
    container_name: ayursutra_mongodb
    restart: always
    environment:
      MONGO_INITDB_DATABASE: ayursutra
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password123
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./ayursutra-backend
      dockerfile: Dockerfile
    container_name: ayursutra_backend
    restart: always
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGO_URI: mongodb://root:password123@mongodb:27017/ayursutra?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FRONTEND_URL: http://localhost:5173
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./ayursutra-backend:/app
      - /app/node_modules
    networks:
      - ayursutra_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend
  frontend:
    build:
      context: ./ayursutra-react
      dockerfile: Dockerfile.dev
    container_name: ayursutra_frontend
    restart: always
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_SOCKET_URL: http://localhost:5000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./ayursutra-react:/app
      - /app/node_modules
    networks:
      - ayursutra_network

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: ayursutra_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - ayursutra_network

volumes:
  mongodb_data:
  mongodb_config:

networks:
  ayursutra_network:
    driver: bridge
